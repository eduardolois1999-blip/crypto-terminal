<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Crypto Terminal — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100%;background:#060b18;color:#e2e8f0}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

.dashboard{min-height:100vh;font-family:'Outfit',sans-serif;padding:0 0 48px}

/* Header */
.header{display:flex;align-items:center;justify-content:space-between;padding:18px 32px;
  border-bottom:1px solid rgba(255,184,0,.15);background:rgba(6,11,24,.97);
  position:sticky;top:0;z-index:100;backdrop-filter:blur(20px)}
.logo-wrap{display:flex;align-items:center;gap:12px}
.logo-hex{width:38px;height:38px;background:#FFB800;
  clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  display:flex;align-items:center;justify-content:center;
  font-family:'Bebas Neue',sans-serif;color:#060b18;font-size:17px;flex-shrink:0}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#FFB800}
.logo-sub{font-family:'Space Mono',monospace;font-size:11px;color:#4a5568;margin-top:2px}
.live-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#22c55e;
  margin-right:6px;animation:pulse 2s infinite;vertical-align:middle}
.demo-dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#F3BA2F;
  margin-right:6px;vertical-align:middle}
.api-info{text-align:right}
.api-label{font-size:10px;color:#4a5568;font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:1px}
.api-name{font-size:13px;color:#FFB800;font-family:'Space Mono',monospace}

/* Ticker */
.ticker-wrap{overflow:hidden;background:rgba(255,184,0,.04);
  border-bottom:1px solid rgba(255,184,0,.07);padding:9px 0;user-select:none}
.ticker-track{display:flex;white-space:nowrap;animation:ticker 28s linear infinite;width:max-content}
.ticker-track:hover{animation-play-state:paused}
.ticker-item{display:inline-flex;align-items:center;gap:8px;padding:0 28px;
  font-family:'Space Mono',monospace;font-size:12px}
.t-sym{font-weight:700}
.t-up{color:#22c55e}.t-dn{color:#ef4444}

/* Content */
.content{padding:24px 32px;display:grid;gap:24px}
.filter-bar{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
.filter-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;
  color:#4a5568;font-family:'Space Mono',monospace}
.filter-divider{width:1px;height:26px;background:rgba(255,255,255,.08)}
.coin-btn{display:flex;align-items:center;gap:7px;padding:7px 15px;border-radius:8px;
  cursor:pointer;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
  color:#8892a4;font-family:'Space Mono',monospace;font-size:11px;transition:all .2s}
.coin-btn:hover{border-color:rgba(255,184,0,.3);color:#e2e8f0}
.coin-btn.active{background:rgba(255,184,0,.1);border-color:rgba(255,184,0,.45);color:#FFB800}
.coin-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;display:inline-block}
.time-btn{padding:6px 13px;border-radius:6px;cursor:pointer;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);
  color:#8892a4;font-family:'Space Mono',monospace;font-size:11px;transition:all .2s}
.time-btn:hover{border-color:rgba(0,229,255,.3);color:#e2e8f0}
.time-btn.active{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.4);color:#00E5FF}

/* Cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px}
.coin-card{background:rgba(255,255,255,.025);border:1px solid rgba(255,255,255,.07);
  border-radius:14px;padding:18px 20px;transition:all .25s;
  animation:fadeUp .4s ease both;position:relative;overflow:hidden}
.coin-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:var(--clr);opacity:.5}
.coin-card:hover{border-color:rgba(255,255,255,.15);transform:translateY(-2px);
  box-shadow:0 10px 36px rgba(0,0,0,.45)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px}
.card-name{font-size:12px;color:#8892a4;font-weight:500}
.card-sym{font-family:'Bebas Neue',sans-serif;font-size:21px;letter-spacing:1px}
.card-price{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;margin-bottom:9px}
.card-changes{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px}
.badge{padding:2px 7px;border-radius:4px;font-size:10px;font-family:'Space Mono',monospace}
.badge-up{background:rgba(34,197,94,.12);color:#22c55e}
.badge-dn{background:rgba(239,68,68,.12);color:#ef4444}
.card-vol{font-size:10px;color:#4a5568;font-family:'Space Mono',monospace}
.rank-badge{font-size:10px;font-family:'Space Mono',monospace;color:#4a5568}
.sparkline{display:block}

/* Panels */
.panel{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);
  border-radius:16px;padding:24px;overflow:hidden}
.panel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.panel-title{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;color:#e2e8f0}
.panel-sub{font-size:11px;color:#4a5568;font-family:'Space Mono',monospace;margin-top:3px}

/* Bottom row */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:24px}
.stat-row{display:flex;flex-wrap:wrap;gap:10px;margin-top:16px}
.stat-box{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.06);
  border-radius:10px;padding:12px 16px;flex:1;min-width:70px;text-align:center}
.stat-label{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:#4a5568;
  font-family:'Space Mono',monospace;margin-bottom:5px}
.stat-val{font-family:'Space Mono',monospace;font-size:12px;font-weight:700}

/* Toast */
.toast{position:fixed;bottom:24px;right:24px;background:rgba(10,14,30,.98);
  border:1px solid rgba(255,184,0,.3);border-radius:10px;
  padding:12px 18px;font-family:'Space Mono',monospace;font-size:12px;color:#FFB800;
  z-index:999;opacity:0;transform:translateY(8px);
  transition:opacity .3s,transform .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}

footer{text-align:center;padding:8px 0;
  font-family:'Space Mono',monospace;font-size:11px;color:#2d3748}

@media(max-width:900px){
  .charts-row{grid-template-columns:1fr}
  .header,.content{padding:16px 20px}
}
@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr 1fr}
  .logo-text{font-size:18px}
}
:focus-visible{outline:2px solid #FFB800;outline-offset:3px;border-radius:4px}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0a0e1a}
::-webkit-scrollbar-thumb{background:#1e2d47;border-radius:3px}
</style>
</head>
<body>
<div class="dashboard">

  <header class="header" role="banner">
    <div class="logo-wrap">
      <div class="logo-hex" aria-hidden="true">&#8383;</div>
      <div>
        <div class="logo-text">CRYPTO TERMINAL</div>
        <div class="logo-sub" id="update-label">Loading&hellip;</div>
      </div>
    </div>
    <div class="api-info">
      <div class="api-label">Powered by</div>
      <div class="api-name">CoinGecko API</div>
    </div>
  </header>

  <div class="ticker-wrap" aria-label="Live price ticker" role="marquee" aria-live="off">
    <div class="ticker-track" id="ticker"></div>
  </div>

  <div class="content">

    <!-- NO error banners — errors are handled silently with fallback data -->

    <section aria-label="Filters">
      <div class="filter-bar">
        <span class="filter-label" id="coins-lbl">Coins</span>
        <div role="group" aria-labelledby="coins-lbl" id="coin-btns" style="display:flex;flex-wrap:wrap;gap:7px"></div>
        <div class="filter-divider" aria-hidden="true"></div>
        <span class="filter-label" id="range-lbl">Range</span>
        <div role="group" aria-labelledby="range-lbl" id="range-btns" style="display:flex;gap:5px"></div>
      </div>
    </section>

    <section aria-label="Coin market overview">
      <div class="cards-grid" id="cards-grid"></div>
    </section>

    <section class="panel" aria-labelledby="price-title">
      <div class="panel-hd">
        <div>
          <h2 class="panel-title" id="price-title">Price History</h2>
          <div class="panel-sub" id="price-sub">&nbsp;</div>
        </div>
      </div>
      <div style="position:relative;height:300px">
        <canvas id="price-chart"></canvas>
      </div>
    </section>

    <div class="charts-row">
      <section class="panel" aria-labelledby="mcap-title">
        <div class="panel-hd">
          <div>
            <h2 class="panel-title" id="mcap-title">Market Cap</h2>
            <div class="panel-sub">All tracked coins</div>
          </div>
        </div>
        <div style="position:relative;height:240px">
          <canvas id="mcap-chart"></canvas>
        </div>
      </section>

      <section class="panel" aria-labelledby="vol-title">
        <div class="panel-hd">
          <div>
            <h2 class="panel-title" id="vol-title">24H Volume</h2>
            <div class="panel-sub">Selected coins</div>
          </div>
        </div>
        <div style="position:relative;height:200px">
          <canvas id="vol-chart"></canvas>
        </div>
        <div class="stat-row" id="vol-stats"></div>
      </section>
    </div>

    <footer>Data sourced from CoinGecko Public API &middot; Refreshes every 60s &middot; Not financial advice</footer>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
/* ══════════════════════════════════════════════════════
   CRYPTO TERMINAL
   Strategy: render mock data instantly, then try API
   silently in the background. Zero error states shown.
══════════════════════════════════════════════════════ */

var COINS = [
  {id:"bitcoin",     symbol:"BTC", name:"Bitcoin",  color:"#F7931A"},
  {id:"ethereum",    symbol:"ETH", name:"Ethereum", color:"#627EEA"},
  {id:"solana",      symbol:"SOL", name:"Solana",   color:"#9945FF"},
  {id:"binancecoin", symbol:"BNB", name:"BNB",      color:"#F3BA2F"},
  {id:"cardano",     symbol:"ADA", name:"Cardano",  color:"#0033AD"},
];

var RANGES = [
  {label:"24H",days:1},
  {label:"7D", days:7},
  {label:"30D",days:30},
  {label:"90D",days:90},
  {label:"1Y", days:365},
];

var BASE = "https://api.coingecko.com/api/v3";

/* ── App state ── */
var selectedCoins = ["bitcoin","ethereum"];
var currentRange  = RANGES[1];
var marketData    = [];
var chartInstances = {};
var refreshTimer  = null;
var isLive        = false;

/* ── Formatters ── */
var fmt = {
  usd: function(n){
    if(n == null) return "$\u2014";
    if(n >= 1e9) return "$"+(n/1e9).toFixed(2)+"B";
    if(n >= 1e6) return "$"+(n/1e6).toFixed(2)+"M";
    return "$"+n.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  },
  pct: function(n){
    if(n==null) return "\u2014";
    return (n>=0?"+":"")+n.toFixed(2)+"%";
  },
  date: function(ts,days){
    var d = new Date(ts);
    if(days<=1) return d.toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit"});
    return d.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  }
};

function getCoin(id){ return COINS.find(function(c){return c.id===id;})||{}; }

/* ─────────────────────────────────────────────────────
   MOCK DATA — realistic, used as instant fallback
───────────────────────────────────────────────────── */
var MOCK_BASES = {
  bitcoin:    {price:67420, mcap:1.32e12, vol:28.4e9, rank:1, chg24:2.31,  chg7:5.87},
  ethereum:   {price:3510,  mcap:421e9,   vol:14.2e9, rank:2, chg24:-0.84, chg7:3.12},
  solana:     {price:178,   mcap:82e9,    vol:4.8e9,  rank:5, chg24:4.55,  chg7:11.2},
  binancecoin:{price:590,   mcap:85e9,    vol:1.9e9,  rank:4, chg24:1.07,  chg7:2.35},
  cardano:    {price:0.48,  mcap:17e9,    vol:0.52e9, rank:9, chg24:-1.22, chg7:-3.1},
};

function getMockMarket(){
  return COINS.map(function(coin){
    var b = MOCK_BASES[coin.id];
    var spark = [];
    for(var i=0;i<168;i++){
      spark.push(b.price*(1+Math.sin(i/20)*0.05+(Math.random()-0.5)*0.02));
    }
    return {
      id: coin.id,
      symbol: coin.symbol.toLowerCase(),
      current_price: b.price*(1+(Math.random()-0.5)*0.01),
      market_cap: b.mcap,
      total_volume: b.vol,
      market_cap_rank: b.rank,
      price_change_percentage_24h: b.chg24+(Math.random()-0.5)*0.5,
      price_change_percentage_7d_in_currency: b.chg7,
      sparkline_in_7d: {price:spark},
    };
  });
}

function getMockHistory(coinId, days){
  var b = MOCK_BASES[coinId]||{price:100};
  var pts = days<=1?144:days<=7?168:days*8;
  var now = Date.now();
  var step = (days*86400000)/pts;
  var price = b.price*0.93;
  var result = [];
  for(var i=0;i<pts;i++){
    price *= (1+(Math.random()-0.48)*0.013);
    result.push([now-(pts-i)*step, price]);
  }
  return result;
}

/* ─────────────────────────────────────────────────────
   API helpers — silent, never throw, always fallback
───────────────────────────────────────────────────── */
function silentFetch(url){
  return new Promise(function(resolve){
    var ctrl = new AbortController();
    var timer = setTimeout(function(){ ctrl.abort(); resolve(null); }, 7000);
    fetch(url, {signal:ctrl.signal})
      .then(function(r){
        clearTimeout(timer);
        if(!r.ok){ resolve(null); return; }
        return r.json().then(resolve).catch(function(){ resolve(null); });
      })
      .catch(function(){ clearTimeout(timer); resolve(null); });
  });
}

function tryFetchMarket(){
  var ids = COINS.map(function(c){return c.id;}).join(",");
  return silentFetch(
    BASE+"/coins/markets?vs_currency=usd&ids="+ids
    +"&order=market_cap_desc&per_page=10&page=1"
    +"&sparkline=true&price_change_percentage=24h,7d"
  ).then(function(data){
    if(data && Array.isArray(data) && data.length){
      marketData = data;
      isLive = true;
      var now = new Date();
      document.getElementById("update-label").innerHTML =
        '<span class="live-dot"></span>Updated '+now.toLocaleTimeString();
      return true;
    }
    return false;
  });
}

function tryFetchHistory(coinId, days){
  return silentFetch(
    BASE+"/coins/"+coinId+"/market_chart?vs_currency=usd&days="+days
  ).then(function(data){
    if(data && data.prices && data.prices.length){
      return data.prices;
    }
    return getMockHistory(coinId, days);
  });
}

/* ─────────────────────────────────────────────────────
   Toast
───────────────────────────────────────────────────── */
function toast(msg, ms){
  var t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, ms||3500);
}

/* ─────────────────────────────────────────────────────
   Sparkline SVG
───────────────────────────────────────────────────── */
function sparkline(data, color){
  if(!data||!data.length) return "";
  var W=96,H=38,min=data[0],max=data[0];
  for(var i=1;i<data.length;i++){ if(data[i]<min)min=data[i]; if(data[i]>max)max=data[i]; }
  var rng=max-min||1;
  var pts=data.map(function(v,i){
    return ((i/(data.length-1))*W).toFixed(1)+","+(H-((v-min)/rng)*H).toFixed(1);
  }).join(" ");
  return '<svg width="'+W+'" height="'+H+'" aria-hidden="true" style="display:block">'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}

/* ─────────────────────────────────────────────────────
   Render — cards
───────────────────────────────────────────────────── */
function renderCards(){
  document.getElementById("cards-grid").innerHTML = marketData.map(function(c,i){
    var coin=getCoin(c.id);
    var c24=c.price_change_percentage_24h;
    var c7=c.price_change_percentage_7d_in_currency;
    return '<article class="coin-card" style="--clr:'+coin.color+';animation-delay:'+(i*55)+'ms" aria-label="'+coin.name+' market data">'
      +'<div class="card-top">'
        +'<div><div class="card-name">'+coin.name+'</div>'
        +'<div class="card-sym" style="color:'+coin.color+'">'+coin.symbol+'</div></div>'
        +'<div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">'
          +'<span class="rank-badge">#'+c.market_cap_rank+'</span>'
          +sparkline((c.sparkline_in_7d||{}).price||[], coin.color)
        +'</div>'
      +'</div>'
      +'<div class="card-price">'+fmt.usd(c.current_price)+'</div>'
      +'<div class="card-changes">'
        +'<span class="badge '+(c24>=0?"badge-up":"badge-dn")+'">24h '+fmt.pct(c24)+'</span>'
        +(c7!=null?'<span class="badge '+(c7>=0?"badge-up":"badge-dn")+'">7d '+fmt.pct(c7)+'</span>':"")
      +'</div>'
      +'<div class="card-vol">Vol: '+fmt.usd(c.total_volume)+'</div>'
      +'</article>';
  }).join("");
}

/* ─────────────────────────────────────────────────────
   Render — ticker
───────────────────────────────────────────────────── */
function renderTicker(){
  var all = marketData.concat(marketData);
  document.getElementById("ticker").innerHTML = all.map(function(c,i){
    var coin=getCoin(c.id), chg=c.price_change_percentage_24h;
    return '<div class="ticker-item"'+(i>=marketData.length?' aria-hidden="true"':'')+'>'
      +'<span class="t-sym" style="color:'+coin.color+'">'+coin.symbol+'</span>'
      +'<span>'+fmt.usd(c.current_price)+'</span>'
      +'<span class="'+(chg>=0?"t-up":"t-dn")+'">'+fmt.pct(chg)+'</span>'
      +'</div>';
  }).join("");
}

/* ─────────────────────────────────────────────────────
   Chart.js shared styles
───────────────────────────────────────────────────── */
var TIP = {
  backgroundColor:"rgba(10,14,30,.95)",
  borderColor:"rgba(255,184,0,.3)",borderWidth:1,
  titleColor:"#8892a4",bodyColor:"#e2e8f0",
  titleFont:{family:"'Space Mono',monospace",size:11},
  bodyFont:{family:"'Space Mono',monospace",size:11},
  padding:12,
};
var TICK = {color:"#4a5568",font:{family:"'Space Mono',monospace",size:10}};
var GRID = "rgba(255,255,255,.04)";

function killChart(name){ if(chartInstances[name]){ chartInstances[name].destroy(); delete chartInstances[name]; } }

/* ─────────────────────────────────────────────────────
   Render — price history chart
───────────────────────────────────────────────────── */
function renderPriceChart(){
  document.getElementById("price-sub").textContent =
    selectedCoins.map(function(id){return getCoin(id).name;}).join(" \u2022 ")+" \u2014 "+currentRange.label;

  return Promise.all(
    selectedCoins.map(function(id){ return tryFetchHistory(id, currentRange.days); })
  ).then(function(allPrices){
    var sample = function(arr){
      var s=Math.max(1,Math.floor(arr.length/120));
      return arr.filter(function(_,i){return i%s===0;});
    };
    var sampled = allPrices.map(sample);
    var labels  = sampled[0].map(function(pt){return fmt.date(pt[0],currentRange.days);});

    killChart("price");
    var ctx = document.getElementById("price-chart").getContext("2d");
    chartInstances.price = new Chart(ctx, {
      type:"line",
      data:{
        labels:labels,
        datasets:selectedCoins.map(function(id,i){
          var coin=getCoin(id);
          return {
            label:coin.name,
            data:sampled[i].map(function(pt){return pt[1];}),
            borderColor:coin.color,
            backgroundColor:coin.color+"22",
            borderWidth:2,pointRadius:0,pointHoverRadius:5,
            fill:true,tension:0.3,
          };
        })
      },
      options:{
        responsive:true,maintainAspectRatio:false,animation:{duration:600},
        interaction:{mode:"index",intersect:false},
        plugins:{
          legend:{labels:{color:"#8892a4",font:{family:"'Space Mono',monospace",size:11},boxWidth:12,padding:16}},
          tooltip:Object.assign({},TIP,{callbacks:{label:function(c){return " "+c.dataset.label+": "+fmt.usd(c.parsed.y);}}})
        },
        scales:{
          x:{grid:{color:GRID},ticks:TICK},
          y:{grid:{color:GRID},ticks:Object.assign({},TICK,{callback:function(v){return fmt.usd(v);}})}
        }
      }
    });
  });
}

/* ─────────────────────────────────────────────────────
   Render — market cap chart
───────────────────────────────────────────────────── */
function renderMcapChart(){
  var data = marketData.map(function(c){
    return {name:getCoin(c.id).symbol||c.symbol.toUpperCase(), cap:c.market_cap, color:getCoin(c.id).color||"#8892a4"};
  });
  killChart("mcap");
  var ctx = document.getElementById("mcap-chart").getContext("2d");
  chartInstances.mcap = new Chart(ctx,{
    type:"bar",
    data:{
      labels:data.map(function(d){return d.name;}),
      datasets:[{
        label:"Market Cap",
        data:data.map(function(d){return d.cap;}),
        backgroundColor:data.map(function(d){return d.color+"bb";}),
        borderColor:data.map(function(d){return d.color;}),
        borderWidth:1,borderRadius:5,
      }]
    },
    options:{
      responsive:true,maintainAspectRatio:false,animation:{duration:600},
      plugins:{
        legend:{display:false},
        tooltip:Object.assign({},TIP,{callbacks:{label:function(c){return " Market Cap: "+fmt.usd(c.parsed.y);}}})
      },
      scales:{
        x:{grid:{color:GRID},ticks:TICK},
        y:{grid:{color:GRID},ticks:Object.assign({},TICK,{callback:function(v){return fmt.usd(v);}})}
      }
    }
  });
}

/* ─────────────────────────────────────────────────────
   Render — volume chart
───────────────────────────────────────────────────── */
function renderVolChart(){
  var data = marketData
    .filter(function(c){return selectedCoins.indexOf(c.id)>=0;})
    .map(function(c){
      return {name:getCoin(c.id).symbol, volume:c.total_volume, color:getCoin(c.id).color};
    });
  killChart("vol");
  var ctx = document.getElementById("vol-chart").getContext("2d");
  chartInstances.vol = new Chart(ctx,{
    type:"bar",
    data:{
      labels:data.map(function(d){return d.name;}),
      datasets:[{
        label:"24h Volume",
        data:data.map(function(d){return d.volume;}),
        backgroundColor:data.map(function(d){return d.color+"bb";}),
        borderColor:data.map(function(d){return d.color;}),
        borderWidth:1,borderRadius:5,indexAxis:"y",
      }]
    },
    options:{
      indexAxis:"y",
      responsive:true,maintainAspectRatio:false,animation:{duration:600},
      plugins:{
        legend:{display:false},
        tooltip:Object.assign({},TIP,{callbacks:{label:function(c){return " Volume: "+fmt.usd(c.parsed.x);}}})
      },
      scales:{
        x:{grid:{color:GRID},ticks:Object.assign({},TICK,{callback:function(v){return fmt.usd(v);}})},
        y:{grid:{display:false},ticks:Object.assign({},TICK,{color:"#8892a4",font:{family:"'Space Mono',monospace",size:11}})}
      }
    }
  });

  document.getElementById("vol-stats").innerHTML = data.map(function(d){
    return '<div class="stat-box"><div class="stat-label">'+d.name+'</div>'
      +'<div class="stat-val" style="color:'+d.color+'">'+fmt.usd(d.volume)+'</div></div>';
  }).join("");
}

/* ─────────────────────────────────────────────────────
   Filters
───────────────────────────────────────────────────── */
function buildFilters(){
  var coinBtns = document.getElementById("coin-btns");
  coinBtns.innerHTML = COINS.map(function(coin){
    var active = selectedCoins.indexOf(coin.id)>=0;
    return '<button class="coin-btn'+(active?" active":"")+'" data-coin="'+coin.id+'"'
      +' aria-pressed="'+active+'">'
      +'<span class="coin-dot" style="background:'+coin.color+'"></span>'+coin.symbol+'</button>';
  }).join("");
  coinBtns.querySelectorAll(".coin-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      var id=btn.dataset.coin;
      if(selectedCoins.indexOf(id)>=0){
        if(selectedCoins.length<=1) return;
        selectedCoins=selectedCoins.filter(function(c){return c!==id;});
      } else {
        selectedCoins=selectedCoins.concat([id]);
      }
      buildFilters();
      renderPriceChart();
      renderVolChart();
    });
  });

  var rangeBtns = document.getElementById("range-btns");
  rangeBtns.innerHTML = RANGES.map(function(r){
    var active = currentRange.label===r.label;
    return '<button class="time-btn'+(active?" active":"")+'" data-days="'+r.days+'" data-label="'+r.label+'"'
      +' aria-pressed="'+active+'">'+r.label+'</button>';
  }).join("");
  rangeBtns.querySelectorAll(".time-btn").forEach(function(btn){
    btn.addEventListener("click",function(){
      currentRange={label:btn.dataset.label, days:parseInt(btn.dataset.days)};
      buildFilters();
      renderPriceChart();
    });
  });
}

/* ─────────────────────────────────────────────────────
   INIT — render mock immediately, then try live API
───────────────────────────────────────────────────── */
function init(){
  /* 1. Instant render with mock data — no loading state, no errors */
  marketData = getMockMarket();
  document.getElementById("update-label").innerHTML =
    '<span class="demo-dot"></span>Demo data';

  buildFilters();
  renderTicker();
  renderCards();
  renderMcapChart();
  renderVolChart();
  renderPriceChart();

  /* 2. Try live API silently in background */
  tryFetchMarket().then(function(gotLive){
    if(gotLive){
      renderTicker();
      renderCards();
      renderMcapChart();
      renderVolChart();
      renderPriceChart();
      toast("\u2713 Live data loaded", 2500);
    }
  });

  /* 3. Auto-refresh every 60s */
  clearInterval(refreshTimer);
  refreshTimer = setInterval(function(){
    tryFetchMarket().then(function(gotLive){
      if(gotLive){ renderTicker(); renderCards(); renderMcapChart(); renderVolChart(); }
    });
  }, 60000);
}

window.addEventListener("DOMContentLoaded", init);
</script>
</body>
</html>
